default_model: qwen2.5-coder:latest
ollama:
  base_url: http://localhost:11434/api
  timeout_seconds: 240
  keep_alive: 10m
  options:
    temperature: 0.1
    top_p: 0.9
    num_predict: 2200
profiles:
  fast:
    temperature: 0.05
    top_p: 0.9
    num_predict: 1400
    reasoning_style: concise
  deep:
    temperature: 0.15
    top_p: 0.95
    num_predict: 3200
    reasoning_style: thorough
cache:
  enabled: true
  directory: db/cache
history:
  database_path: db/history.db
  similar_results: 3
export:
  directory: exports
supported_languages:
  - python
  - javascript
  - typescript
  - java
  - go
  - rust
preferred_models:
  - qwen2.5-coder:latest
  - llama3.1:8b
  - qwen2.5-coder-4k:latest
  - qwen2.5-coder:1.5b
  - qwen2.5-coder:7b
  - deepseek-coder-v2
  - codellama:13b
